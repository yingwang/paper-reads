name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.github/workflows/deploy-docs.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install \
            "mkdocs-material>=9.5" \
            "mkdocs-awesome-pages-plugin>=2.10" \
            "pymdown-extensions>=10.7" \
            "mkdocs>=1.6" \
            "mdx-truly-sane-lists>=1.3"

      - name: Insert blank line before lazy bullet lists (GitHub-style)
        run: |
          python3 - <<'EOF'
          import re, pathlib
          BULLET = re.compile(r'^\s*-\s')
          LIST_LIKE = re.compile(r'^\s*(?:-|\d+\.)\s')
          for p in pathlib.Path('docs').rglob('*.md'):
              lines = p.read_text().split('\n')
              out = []
              in_fence = False
              for line in lines:
                  stripped = line.lstrip()
                  if stripped.startswith('```') or stripped.startswith('~~~'):
                      in_fence = not in_fence
                  elif (not in_fence
                        and BULLET.match(line)
                        and out and out[-1].strip()
                        and not LIST_LIKE.match(out[-1])):
                      out.append('')
                  out.append(line)
              p.write_text('\n'.join(out))
          EOF

      - name: Build site
        run: mkdocs build --site-dir _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
