site_name: "每日论文精读 / Daily Paper Reads"
site_description: "每天追一篇 huggingface daily papers 榜首论文的中文四段精读：问题 - 方法 - 实验 - 局限。"
site_url: https://yingwang.github.io/paper-reads/
repo_url: https://github.com/yingwang/paper-reads
repo_name: yingwang/paper-reads
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: _site
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yingwang
  alternate:
    - name: 中文
      link: /paper-reads/
      lang: zh
    - name: English
      link: /paper-reads/en/
      lang: en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - mdx_truly_sane_lists
  - toc:
      permalink: true
      permalink_title: 链接到此节
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search:
      lang:
        - en
        - zh
  - awesome-pages

nav:
  - 中文:
    - 最新: index.md
    - 2026-05-30 — Qwen-VLA：统一跨任务跨形态的视觉-语言-动作模型: papers/2026-05-30-qwen-vla-unified-embodied-foundation-model.md
    - 2026-05-29 — AgentDoG 1.5：约千条样本训出的轻量智能体安全护栏: papers/2026-05-29-agentdog-agent-safety-alignment.md
    - 2026-05-27 — LocateAnything：把检测框当作原子单位并行解码: papers/2026-05-27-locateanything-parallel-box-decoding.md
    - 2026-05-26 — DVAO：用奖励方差给多目标 RL 当动态权重: papers/2026-05-26-dvao-variance-adaptive-multi-reward-grpo.md
    - 2026-05-25 — SkillOpt：让 agent 技能像权重一样被训练: papers/2026-05-25-skillopt-self-evolving-agent-skills.md
    - 2026-05-24 — DelTA：判别式 token 信用分配重塑 RLVR: papers/2026-05-24-delta-discriminative-token-credit-assignment-rlvr.md
    - 2026-05-23 — TransitLM：无地图公交路径生成: papers/2026-05-23-transitlm-map-free-transit-route-generation.md
    - 2026-05-22 — π-Bench：主动型个人助理 agent 评估: papers/2026-05-22-pi-bench-proactive-personal-assistant.md
    - 2026-05-21 — LiBrA-Net：实时 4K 视频去雾: papers/2026-05-21-libra-net-real-time-4k-video-dehazing.md
    - 2026-05-21 — OScaR：极致 KV 缓存量化的奥卡姆剃刀方案: papers/2026-05-21-oscar-extreme-kv-cache-quantization.md
    - 2026-05-19 — LongLive-2.0 用 NVFP4 并行底座做长视频生成: papers/2026-05-19-longlive-2-nvfp4-parallel-infra-long-video.md
    - 2026-05-18 — MMSkills：多模态视觉智能体技能: papers/2026-05-18-mmskills-multimodal-skills-visual-agents.md
    - 2026-05-17 — 奥赛金牌级推理的简单统一扩展: papers/2026-05-17-gold-medal-olympiad-reasoning.md
  - English:
