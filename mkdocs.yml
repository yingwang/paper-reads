    - 2026-05-27 — LocateAnything - Treating a Bounding Box as One Atomic Unit for Parallel Decoding: en/papers/2026-05-27-locateanything-parallel-box-decoding.md
    - 2026-05-26 — DVAO - Reward Variance as Dynamic Weights for Multi-objective GRPO: en/papers/2026-05-26-dvao-variance-adaptive-multi-reward-grpo.md
    - 2026-05-25 — SkillOpt - Executive Strategy for Self-Evolving Agent Skills: en/papers/2026-05-25-skillopt-self-evolving-agent-skills.md
    - 2026-05-24 — DelTA - Discriminative Token Credit Assignment for RLVR: en/papers/2026-05-24-delta-discriminative-token-credit-assignment-rlvr.md
    - 2026-05-23 — TransitLM - Map-Free Transit Route Generation: en/papers/2026-05-23-transitlm-map-free-transit-route-generation.md
    - 2026-05-22 — π-Bench - Proactive Personal Assistant Agents: en/papers/2026-05-22-pi-bench-proactive-personal-assistant.md
    - 2026-05-21 — LiBrA-Net Real-Time 4K Video Dehazing: en/papers/2026-05-21-libra-net-real-time-4k-video-dehazing.md
    - 2026-05-21 — OScaR - Occam's Razor for Extreme KV Cache Quantization: en/papers/2026-05-21-oscar-extreme-kv-cache-quantization.md
    - 2026-05-19 — LongLive-2.0 NVFP4 Parallel Infrastructure for Long Video: en/papers/2026-05-19-longlive-2-nvfp4-parallel-infra-long-video.md
    - 2026-05-18 — MMSkills - Multimodal Skills for Visual Agents: en/papers/2026-05-18-mmskills-multimodal-skills-visual-agents.md
