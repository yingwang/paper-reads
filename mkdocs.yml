site_name: "每日论文精读 / Daily Paper Reads"
site_description: "每天追一篇 huggingface daily papers 榜首论文的中文四段精读：问题 - 方法 - 实验 - 局限。"
site_url: https://yingwang.github.io/paper-reads/
repo_url: https://github.com/yingwang/paper-reads
repo_name: yingwang/paper-reads
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: _site
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yingwang
  alternate:
    - name: 中文
      link: /paper-reads/
      lang: zh
    - name: English
      link: /paper-reads/en/
      lang: en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - mdx_truly_sane_lists
  - toc:
      permalink: true
      permalink_title: 链接到此节
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search:
      lang:
        - en
        - zh
  - awesome-pages

nav:
  - 中文:
    - 最新: index.md
    - 2026-05-19 — LongLive-2.0 用 NVFP4 并行底座做长视频生成: papers/2026-05-19-longlive-2-nvfp4-parallel-infra-long-video.md
    - 2026-05-18 — MMSkills：多模态视觉智能体技能: papers/2026-05-18-mmskills-multimodal-skills-visual-agents.md
    - 2026-05-17 — 奥赛金牌级推理的简单统一扩展: papers/2026-05-17-gold-medal-olympiad-reasoning.md
  - English:
    - Latest: en/index.md
    - 2026-05-19 — LongLive-2.0 NVFP4 Parallel Infrastructure for Long Video: en/papers/2026-05-19-longlive-2-nvfp4-parallel-infra-long-video.md
    - 2026-05-18 — MMSkills - Multimodal Skills for Visual Agents: en/papers/2026-05-18-mmskills-multimodal-skills-visual-agents.md
    - 2026-05-17 — Gold-Medal Olympiad Reasoning: en/papers/2026-05-17-gold-medal-olympiad-reasoning.md

